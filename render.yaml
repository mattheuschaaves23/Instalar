databases:
  - name: bem-instalado-db
    databaseName: bem_instalado
    user: bem_instalado
    region: oregon
    plan: starter

services:
  - type: web
    name: bem-instalado
    runtime: node
    rootDir: bem-instalado/backend
    region: oregon
    plan: starter
    buildCommand: npm install && npm run build:web
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: bem-instalado-db
          property: connectionString
      - key: FRONTEND_URL
        sync: false
      - key: APP_URL
        sync: false
      - key: SUBSCRIPTION_LAUNCH_ACCESS
        value: "false"
      - key: ASAAS_ENVIRONMENT
        value: production
      - key: ASAAS_API_KEY
        sync: false
      - key: ASAAS_WEBHOOK_TOKEN
        sync: false
      - key: ASAAS_USER_AGENT
        value: InstalaPro/1.0 (Node.js; production)
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "465"
      - key: SMTP_SECURE
        value: "true"
      - key: SMTP_USER
        value: beminstaladohd@gmail.com
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM
        value: InstalaPro <beminstaladohd@gmail.com>
      - key: GOOGLE_OAUTH_CLIENT_ID
        sync: false
      - key: GOOGLE_OAUTH_CLIENT_SECRET
        sync: false
      - key: GOOGLE_OAUTH_CALLBACK_URL
        sync: false
