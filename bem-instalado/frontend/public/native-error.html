<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta name="theme-color" content="#080706" />
    <title>InstalaPro Instaladores</title>
    <style>
      * { box-sizing: border-box; }
      body { margin: 0; min-height: 100vh; display: grid; place-items: center; padding: 24px; background: #080706; color: #f6efdf; font-family: Arial, sans-serif; }
      main { width: min(100%, 460px); text-align: center; }
      span { display: inline-grid; width: 58px; height: 58px; place-items: center; border: 1px solid #cda349; border-radius: 18px; color: #e8be58; font-size: 26px; }
      h1 { margin: 24px 0 12px; font-size: 26px; }
      p { margin: 0; color: #c8bdab; line-height: 1.6; }
    </style>
  </head>
  <body>
    <main>
      <span>IP</span>
      <h1>Atualize o Android System WebView</h1>
      <p>Este aparelho precisa da versão mais recente do Android System WebView ou do Google Chrome para abrir o InstalaPro com segurança.</p>
    </main>
  </body>
</html>
